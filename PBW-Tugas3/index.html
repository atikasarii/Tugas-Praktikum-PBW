<html>
<head>
    <title>Cek Nilai Mahasiswa</title>
</head>
<body>

<h2>Program Cek Nilai Mahasiswa</h2>

<form>
    <label>NIM :</label><br>
    <input type="text" id="nim"><br><br>

    <label>Nilai :</label><br>
    <input type="number" id="nilai"><br><br>

    <button type="button" onclick="cekNilai()">Cek Nilai</button>
</form>

<br>
<p id="hasil"></p>

<script>
function cekNilai() {

    let nim = document.getElementById("nim").value;
    let nilai = parseInt(document.getElementById("nilai").value);
    let huruf;

    if (nilai < 0 || nilai > 100 || isNaN(nilai)) {
        document.getElementById("hasil").innerHTML = "Error: Nilai tidak valid!";
        return;
    }

    if (nilai >= 80) {
        huruf = "A";
    } 
    else if (nilai >= 70) {
        huruf = "B";
    } 
    else if (nilai >= 60) {
        huruf = "C";
    } 
    else if (nilai >= 50) {
        huruf = "D";
    } 
    else {
        huruf = "E";
    }

    document.getElementById("hasil").innerHTML =
        "NIM: " + nim + "<br>Huruf Mutu: " + huruf;
}
</script>

</body>
</html>
